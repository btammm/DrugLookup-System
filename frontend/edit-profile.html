<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>

Cập nhật hồ sơ

</title>

</head>


<body>


<h1>

Cập nhật hồ sơ

</h1>



<input

id="name"

placeholder="Họ tên">


<br>


<br>



<input

id="phone"

placeholder="SĐT">


<br>

<br>




<input

id="avatar"

placeholder="Avatar URL">


<br>


<br>



<button

onclick="save()"

>

Lưu


</button>




<script>


const user=


JSON.parse(

localStorage.getItem(

"user"

)

);



async function load(){



const response=

await fetch(


`http://localhost:5000/api/auth/profile/${user.id}`


);



const data=


await response.json();




document.getElementById(

'name'

).value=


data.full_name;




document.getElementById(

'phone'

).value=


data.phone;




document.getElementById(

'avatar'

).value=


data.avatar;



}



async function save(){



const response=


await fetch(


`http://localhost:5000/api/auth/profile/${user.id}`


,

{

method:'PUT',


headers:{


'Content-Type':'application/json'


},



body:JSON.stringify({



full_name:

document.getElementById(

'name'

).value,




phone:

document.getElementById(

'phone'

).value,




avatar:

document.getElementById(

'avatar'

).value



})


}



);




const data=


await response.json();




alert(

data.message

);



window.location.href=

'profile.html';



}



load();


</script>


</body>

</html>
