<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Quản lý thuốc</title>

<style>

body{

font-family:Arial;
padding:30px;
background:#f2f5fa;

}


table{

width:100%;

background:white;

border-collapse:collapse;

}


th,td{

padding:15px;

border:1px solid #ddd;

text-align:center;

}


button{

padding:8px 12px;

margin:5px;

cursor:pointer;

}


.add{

background:green;
color:white;

}


.edit{

background:orange;
color:white;

}


.delete{

background:red;
color:white;

}

</style>


</head>


<body>


<h1>

Quản lý thuốc

</h1>



<button

class="add"

onclick="addDrug()">

Thêm thuốc

</button>



<table>



<thead>


<tr>

<th>STT</th>

<th>Tên thuốc</th>

<th>Hoạt chất</th>

<th>Thao tác</th>


</tr>


</thead>



<tbody

id="tbody">


</tbody>



</table>


<script src="config.js"></script>


<script>



async function loadDrugs(){



const response=

await fetch(

`${API_URL}/api/drugs`

);



const drugs=

await response.json();



let html='';



drugs.forEach((drug,index)=>{

html+=`

<tr>

<td>

${index+1}

</td>



<td>

${drug.trade_name}

</td>



<td>

${drug.active_ingredient}

</td>



<td>



<button

class="edit"


onclick="editDrug(

${drug.id}

)">


Sửa


</button>



<button

class="delete"


onclick="deleteDrug(

${drug.id}

)"

>

Xóa


</button>



</td>



</tr>



`;



});



document.getElementById(

'tbody'

).innerHTML=html;



}



loadDrugs();



function addDrug(){

window.location.href=

'add-drug.html';

}

function editDrug(id){

window.location.href=

`edit-drug.html?id=${id}`;

}

async function deleteDrug(id){


const ok=confirm(

"Bạn có chắc muốn xóa?"

);



if(!ok)return;



const response=

await fetch(

`${API_URL}/api/drugs/${id}`

,


{

method:'DELETE'

}


);



const data=

await response.json();



alert(

data.message

);



loadDrugs();



}

</script>



</body>


</html>
