<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Thêm thuốc</title>


<style>


body{

font-family:Arial;

padding:30px;

background:#f2f5fa;

}



.container{

width:500px;

margin:auto;


background:white;


padding:30px;


border-radius:10px;


}



input,
textarea{

width:100%;
padding:10px;

margin-top:10px;
margin-bottom:15px;

border:1px solid #ccc;
border-radius:5px;

font-family:Arial;

}


textarea{

height:100px;

resize:none;

}


button{


padding:10px 20px;


background:green;


color:white;


border:none;


cursor:pointer;


}



</style>

</head>

<body>



<div class="container">


<h2>

Thêm thuốc

</h2>



<input
id="trade_name"
placeholder="Tên thuốc">


<input
id="ingredient"
placeholder="Hoạt chất">



<textarea id="usage" placeholder="Công dụng"></textarea>


<textarea id="dosage" placeholder="Liều dùng"></textarea>


<textarea id="effect" placeholder="Tác dụng phụ"></textarea>



<button onclick="save()">

Lưu

</button>


</div>


<script src="config.js"></script>

<script>



async function save(){



const response=

await fetch(

`${API_URL}/api/drugs`,

{


method:'POST',



headers:{

'Content-Type':'application/json'

},



body:JSON.stringify({


trade_name:

document.getElementById(

'trade_name'

).value,



active_ingredient:

document.getElementById(

'ingredient'

).value,



usage_text:

document.getElementById(

'usage'

).value,



dosage:

document.getElementById(

'dosage'

).value,



side_effects:

document.getElementById(

'effect'

).value



})



}



);



const data=

await response.json();



alert(

data.message

);



window.location.href=

'drug-management.html';



}



</script>



</body>


</html>
