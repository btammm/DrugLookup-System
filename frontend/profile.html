<!DOCTYPE html>

<html>


<head>

<meta charset="UTF-8">


<title>

Hồ sơ cá nhân

</title>



<style>


body{

font-family:Arial;

padding:30px;

background:#f2f5fa;

}



.container{


width:600px;


margin:auto;


background:white;


padding:30px;


border-radius:10px;


}



p{


margin-top:15px;


}



img{


width:120px;


height:120px;


border-radius:50%;


object-fit:cover;


}


</style>



</head>



<body>




<div class="container">


<h1>

Hồ sơ cá nhân

</h1>



<img

id="avatar"

src="https://placehold.co/120x120"

>



<p>

Tên:


<span id="name">

</span>


</p>




<p>

Email:


<span id="email">

</span>


</p>



<p>

SĐT:


<span id="phone">

</span>


</p>




<p>

Vai trò:


<span id="role">

</span>


</p>




<p>

Ngày tạo:


<span id="created">

</span>


</p>



<button

onclick="editProfile()"

>

Cập nhật


</button>



<button

onclick="changePassword()"

>

Đổi mật khẩu


</button>




</div>



<script src="config.js"></script>

<script>



const user=


JSON.parse(


localStorage.getItem(

"user"

)

);

if(!user){

window.location.href=

'login.html';

}

async function loadProfile(){



const response=


await fetch(


`${API_URL}/api/auth/profile`


);




const data=


await response.json();





document.getElementById(

'name'

).innerText=


data.full_name;





document.getElementById(

'email'

).innerText=


data.email;





document.getElementById(

'phone'

).innerText=


data.phone || '';





document.getElementById(

'role'

).innerText=


data.role;





document.getElementById(

'created'

).innerText=


data.created_at;





if(data.avatar){


document.getElementById(

'avatar'

).src=

data.avatar;


}




}



function editProfile(){


window.location.href=

'edit-profile.html';


}



function changePassword(){


window.location.href=

'change-password.html';


}



loadProfile();



</script>




</body>

</html>
