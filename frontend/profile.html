<!DOCTYPE html>

<html>


<head>

<meta charset="UTF-8">


<title>

Hồ sơ cá nhân

</title>



<style>
body{

font-family:Arial;

background:#f4f7fb;

padding:40px;

}



.container{

max-width:700px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,.08);

}



h1{

margin-bottom:30px;

font-size:40px;

}



.profile{

display:flex;

gap:30px;

align-items:center;

margin-bottom:30px;

}



img{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #4CAF50;

}



.info{

flex:1;

}



.info p{

padding:15px 0;

border-bottom:1px solid #eee;

font-size:17px;

}



.buttons{

margin-top:30px;

display:flex;

gap:15px;

}



button{

padding:12px 25px;

border:none;

border-radius:10px;

cursor:pointer;

font-size:15px;

transition:.3s;

}



.update{

background:#4CAF50;

color:white;

}



.password{

background:#2196F3;

color:white;

}



button:hover{

opacity:.9;

transform:translateY(-2px);

}

</style>



</head>



<body>




<div class="container">

<h1>Hồ sơ cá nhân</h1>



<div class="profile">


<img
id="avatar"
src="https://placehold.co/120x120">



<div class="info">

<p>

Tên:
<b>

<span id="name"></span>

</b>

</p>



<p>

Email:
<b>

<span id="email"></span>

</b>

</p>



<p>

SĐT:
<b>

<span id="phone"></span>

</b>

</p>



<p>

Vai trò:
<b>

<span id="role"></span>

</b>

</p>



<p>

Ngày tạo:
<b>

<span id="created"></span>

</b>

</p>


</div>


</div>



<div class="buttons">

<button
class="update"
onclick="editProfile()">

Cập nhật


</button>



<button
class="password"
onclick="changePassword()">

Đổi mật khẩu


</button>


</div>


</div>



<script src="config.js"></script>

<script>



const user=


JSON.parse(


localStorage.getItem(

"user"

)

);

if(!user){

window.location.href=

'login.html';

}

async function loadProfile(){



const response=


await fetch(


`${API_URL}/api/auth/profile/${user.id}`


);




const data=


await response.json();





document.getElementById(

'name'

).innerText=


data.full_name;





document.getElementById(

'email'

).innerText=


data.email;





document.getElementById(

'phone'

).innerText=


data.phone || '';





document.getElementById(

'role'

).innerText=


data.role;





document.getElementById(

'created'

).innerText=


data.created_at;





if(data.avatar){


document.getElementById(

'avatar'

).src=

data.avatar;


}




}



function editProfile(){


window.location.href=

'edit-profile.html';


}



function changePassword(){


window.location.href=

'change-password.html';


}



loadProfile();



</script>




</body>

</html>
