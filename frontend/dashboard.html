<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}


body{

display:flex;

height:100vh;

background:#f5f7fb;

}



.sidebar{

width:250px;

background:white;

padding:25px;

box-shadow:2px 0 15px rgba(0,0,0,0.05);

}


.sidebar h3{

font-size:28px;

color:#2563eb;

margin-bottom:40px;

}



.sidebar ul{

list-style:none;

}



.sidebar li{

padding:15px 18px;

margin-bottom:12px;

border-radius:12px;

transition:0.3s;

font-size:16px;

}



.sidebar li:hover{

background:#2563eb;

color:white;

cursor:pointer;

}



.main{

flex:1;

padding:30px;

}




.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:40px;

}


.header h2{

font-size:36px;

}


.header h3{

font-size:22px;

color:#666;

}





.cards{

display:flex;

gap:25px;

margin-bottom:40px;

}



.card{

background:white;

padding:25px;

border-radius:18px;

width:220px;

box-shadow:0 5px 15px rgba(0,0,0,0.05);

transition:0.3s;

}



.card:hover{

transform:translateY(-5px);

}



.card h3{

font-size:18px;

color:#666;

margin-bottom:15px;

}



.card p{

font-size:38px;

font-weight:bold;

color:#2563eb;

}



.content{


background:white;


height:450px;


padding:30px;


border-radius:20px;


box-shadow:0 5px 15px rgba(0,0,0,0.05);

}


</style>


</head>


<body>



<div class="sidebar">


<h3>Drug Lookup</h3>


<ul>

<li>

🏠 Dashboard

</li>

    
<li onclick="profile()">

👤 Hồ sơ cá nhân

</li>


<li onclick="ingredient()">

🔍 Tra cứu hoạt chất

</li>


<li onclick="usage()">

💊 Tra cứu công dụng

</li>


<li onclick="drug()">

📦 Quản lý thuốc

</li>


<li onclick="purpose()">

🧪 Quản lý công dụng

</li>



<li onclick="statistics()">

📊 Thống kê

</li>

<li onclick="logout()">

Đăng xuất

</li>

</ul>



</div>



<div class="main">


<div class="header">

<h2>DASHBOARD</h2>

<h3>Hello, Admin</h3>


</div>



<div class="cards">

<div class="card">

<h3>

Tổng thuốc

</h3>


<p id="drugCount">

0

</p>

</div>




<div class="card">

<h3>

Hoạt chất

</h3>


<p id="ingredientCount">

0

</p>

</div>

<div class="card">

<h3>

Công dụng

</h3>


<p id="usageCount">

0

</p>

</div>


<div class="card">

<h3>

Người dùng

</h3>


<p id="userCount">

0

</p>

</div>



</div>



<div class="content">


Khu vực nội dung



</div>



</div>


<script src="config.js"></script>

<script>

const user=

JSON.parse(

localStorage.getItem(

'user'

)

);


if(!user){

window.location.href=

'login.html';

}

function profile(){

window.location.href="profile.html";

}


function ingredient(){

window.location.href="ingredient.html";

}



function usage(){

window.location.href="usage.html";

}



function drug(){

window.location.href="drug-management.html";

}



function purpose(){

window.location.href="purpose.html";

}



function statistics(){

window.location.href="statistics.html";

}

function logout(){

localStorage.removeItem(

'user'

);

window.location.href=

'login.html';

}

async function loadStats(){

try{

const response = await fetch(

`${API_URL}/api/drugs/stats/dashboard`

);

const data = await response.json();



document.getElementById(

'drugCount'

).innerText =

data.totalDrugs;



document.getElementById(

'ingredientCount'

).innerText =

data.totalIngredients;



document.getElementById(

'usageCount'

).innerText =

data.totalUsages;



document.getElementById(

'userCount'

).innerText =

data.totalUsers;

}
catch(error){

console.log(error);

}

}


loadStats();

</script>



</body>


</html>
