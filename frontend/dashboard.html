<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

display:flex;

height:100vh;

background:#f2f5fa;

}


.sidebar{

width:250px;

background:#cfe3e7;

padding:20px;

}


.sidebar h3{

margin-bottom:20px;

}


.sidebar ul{

list-style:none;

}


.sidebar li{

padding:12px;

cursor:pointer;

margin-bottom:5px;

}


.sidebar li:hover{

background:white;

border-radius:5px;

}



.main{

flex:1;

padding:30px;

}


.header{

display:flex;

justify-content:space-between;

margin-bottom:30px;

}


.cards{

display:flex;

gap:20px;

margin-bottom:30px;

}


.card{

background:white;

padding:15px;

border-radius:10px;

width:130px;

text-align:center;

}


.content{

background:white;

height:250px;

border-radius:15px;

padding:20px;

}



</style>


</head>


<body>



<div class="sidebar">


<h3>Menu</h3>


<ul>

<li onclick="profile()">

👤 Hồ sơ cá nhân

</li>


<li onclick="ingredient()">

🔍 Tra cứu hoạt chất

</li>


<li onclick="usage()">

💊 Tra cứu công dụng

</li>


<li onclick="drug()">

📦 Quản lý thuốc

</li>


<li onclick="purpose()">

🧪 Quản lý công dụng

</li>



<li onclick="statistics()">

📊 Thống kê

</li>

<li onclick="logout()">

Đăng xuất

</li>

</ul>



</div>



<div class="main">


<div class="header">

<h2>DASHBOARD</h2>

<h3>Hello, Admin</h3>


</div>



<div class="cards">

<div class="card">

<h3>

Tổng thuốc

</h3>


<p id="drugCount">

0

</p>

</div>




<div class="card">

<h3>

Hoạt chất

</h3>


<p id="ingredientCount">

0

</p>

</div>

<div class="card">

<h3>

Công dụng

</h3>


<p id="usageCount">

0

</p>

</div>


<div class="card">

<h3>

Người dùng

</h3>


<p id="userCount">

0

</p>

</div>



</div>



<div class="content">


Khu vực nội dung



</div>



</div>


<script src="config.js"></script>

<script>

const user=

JSON.parse(

localStorage.getItem(

'user'

)

);


if(!user){

window.location.href=

'login.html';

}

function profile(){

window.location.href="profile.html";

}


function ingredient(){

window.location.href="ingredient.html";

}



function usage(){

window.location.href="usage.html";

}



function drug(){

window.location.href="drug-management.html";

}



function purpose(){

window.location.href="purpose.html";

}



function statistics(){

window.location.href="statistics.html";

}

function logout(){

localStorage.removeItem(

'user'

);

window.location.href=

'login.html';

}

async function loadStats(){

try{

const response = await fetch(
`${API_URL}/api/drugs`
);

const data = await response.json();


// Tổng số thuốc
document.getElementById(
'drugCount'
).innerText =
data.length;


// Số hoạt chất không trùng
const ingredients = new Set(
data.map(
d => d.active_ingredient
)
);

document.getElementById(
'ingredientCount'
).innerText =
ingredients.size;


// Số công dụng không trùng
const usages = new Set(
data.map(
d => d.usage
)
);

document.getElementById(
'usageCount'
).innerText =
usages.size;


const userResponse =
await fetch(
`${API_URL}/api/auth/count`
);

const userData =
await userResponse.json();


document.getElementById(
'userCount'
).innerText =
userData.totalUsers;

}catch(error){

console.log(error);

}

}

loadStats();

</script>



</body>


</html>
