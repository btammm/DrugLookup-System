<!DOCTYPE html>

<html>


<head>

<meta charset="UTF-8">


<title>

Sửa thuốc

</title>



<style>


body{

font-family:Arial;

padding:30px;

background:#f2f5fa;

}



.container{

width:500px;

margin:auto;


background:white;


padding:30px;


border-radius:10px;


}



input,textarea{


width:100%;


padding:10px;


margin-top:10px;


margin-bottom:15px;


}



button{


padding:10px 20px;


background:orange;


color:white;


border:none;


cursor:pointer;


}



</style>



</head>



<body>



<div class="container">


<h2>

Sửa thuốc

</h2>



<input id="trade_name">


<input id="ingredient">


<textarea id="usage"></textarea>



<textarea id="dosage"></textarea>



<textarea id="effect"></textarea>



<button onclick="save()">

Cập nhật


</button>



</div>





<script>



const params=


new URLSearchParams(

window.location.search

);



const id=

params.get(

'id'

);




async function loadDrug(){



const response=


await fetch(

`http://localhost:5000/api/drugs/${id}`

);



const drug=


await response.json();




document.getElementById(

'trade_name'

).value=


drug.trade_name;




document.getElementById(

'ingredient'

).value=


drug.active_ingredient;




document.getElementById(

'usage'

).value=


drug.usage_text;




document.getElementById(

'dosage'

).value=


drug.dosage;




document.getElementById(

'effect'

).value=


drug.side_effects;



}




async function save(){



const response=


await fetch(

`http://localhost:5000/api/drugs/${id}`

,


{

method:'PUT',



headers:{


'Content-Type':'application/json'


},




body:JSON.stringify({



trade_name:

document.getElementById(

'trade_name'

).value,




active_ingredient:

document.getElementById(

'ingredient'

).value,




usage_text:

document.getElementById(

'usage'

).value,




dosage:

document.getElementById(

'dosage'

).value,




side_effects:

document.getElementById(

'effect'

).value




})


}



);



const data=

await response.json();



alert(

data.message

);



window.location.href=

'drug-management.html';



}



loadDrug();



</script>



</body>

</html>
