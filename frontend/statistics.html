<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>

Thống kê

</title>


<style>

body{

font-family:Arial;

padding:30px;

background:#f2f5fa;

}


.section{

background:white;

padding:20px;

margin-bottom:20px;

border-radius:10px;

}


.card{

padding:10px;

margin-top:10px;

background:#eee;

}


</style>


</head>


<body>



<h1>

THỐNG KÊ

</h1>



<div class="section">


<h2>

Top Công dụng

</h2>



<div id="usage">


</div>


</div>




<div class="section">


<h2>

Top Hoạt chất

</h2>



<div id="ingredient">


</div>



</div>




<div class="section">


<h2>

Thuốc mới thêm

</h2>



<div id="latest">


</div>



</div>


<script src="config.js"></script>

<script>

const user = JSON.parse(

localStorage.getItem(

'user'

)

);



if(!user){

window.location.href=

'login.html';

}


async function loadUsage(){



const response=

await fetch(

`${API_URL}/api/drugs`

);



const data=

await response.json();



let html='';



data.forEach(

u=>{


html+=`


<div class="card">

${u.usage_name}

-

${u.total}


</div>



`;



}


);



document.getElementById(

'usage'

).innerHTML=html;



}




async function loadIngredient(){



const response=

await fetch(

`${API_URL}/api/drugs/stats/top-ingredients`

);



const data=

await response.json();



let html='';



data.forEach(

u=>{


html+=`


<div class="card">

${u.active_ingredient}


-

${u.total}


</div>


`;



}


);



document.getElementById(

'ingredient'

).innerHTML=html;



}




async function loadLatest(){


const response=

await fetch(

`${API_URL}/api/drugs/stats/latest`

);



const data=

await response.json();



let html='';



data.forEach(

d=>{


html+=`

<div class="card">

${d.trade_name}

</div>



`;



}



);



document.getElementById(

'latest'

).innerHTML=html;



}




loadUsage();


loadIngredient();


loadLatest();



</script>




</body>


</html>
