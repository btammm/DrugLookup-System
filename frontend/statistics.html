<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>

Thống kê

</title>


<style>
body{

font-family:Arial;

background:#f4f7fb;

padding:40px;

}



h1{

font-size:40px;

margin-bottom:40px;

}



.section{


background:white;


padding:30px;


margin-bottom:30px;


border-radius:20px;


box-shadow:0 5px 20px rgba(0,0,0,.08);


}




.section h2{


margin-bottom:25px;


font-size:30px;


}




.card{


display:flex;


justify-content:space-between;


align-items:center;



padding:18px 25px;


margin-bottom:15px;



border-radius:12px;


background:#f7f9fc;



transition:.3s;


}




.card:hover{


background:#e8f0ff;


transform:translateY(-2px);


}




.name{


font-size:18px;


font-weight:600;


}




.total{


background:#4CAF50;


padding:6px 15px;


border-radius:30px;


color:white;


font-size:14px;


font-weight:bold;


}

</style>


</head>


<body>



<h1>

THỐNG KÊ

</h1>



<div class="section">


<h2>

Top Công dụng

</h2>



<div id="usage">


</div>


</div>




<div class="section">


<h2>

Top Hoạt chất

</h2>



<div id="ingredient">


</div>



</div>




<div class="section">


<h2>

Thuốc mới thêm

</h2>



<div id="latest">


</div>



</div>


<script src="config.js"></script>

<script>

const user = JSON.parse(

localStorage.getItem(

'user'

)

);



if(!user){

window.location.href=

'login.html';

}


async function loadUsage(){



const response = await fetch(

`${API_URL}/api/drugs/stats/top-usages`

);



const data=

await response.json();



let html='';



data.forEach(

u=>{


html+=`

<div class="card">

<div class="name">

🩺 ${u.usage_name}

</div>



<div class="total">

${u.total}

</div>



</div>

`;



}


);



document.getElementById(

'usage'

).innerHTML=html;



}




async function loadIngredient(){



const response=

await fetch(

`${API_URL}/api/drugs/stats/top-ingredients`

);



const data=

await response.json();



let html='';



data.forEach(

u=>{


html+=`


<div class="card">

${u.active_ingredient}


-

${u.total}


</div>


`;



}


);



document.getElementById(

'ingredient'

).innerHTML=html;



}




async function loadLatest(){


const response=

await fetch(

`${API_URL}/api/drugs/stats/latest`

);



const data=

await response.json();



let html='';



data.forEach(

d=>{


html+=`

<div class="card">

${d.trade_name}

</div>



`;



}



);



document.getElementById(

'latest'

).innerHTML=html;



}




loadUsage();


loadIngredient();


loadLatest();



</script>




</body>


</html>
