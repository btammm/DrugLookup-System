<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Tra cứu hoạt chất</title>

    <style>

        body{

font-family:'Segoe UI',sans-serif;

background:#f5f7fb;

padding:40px;

}


.container{

max-width:900px;

margin:auto;

}


h2{

text-align:center;

font-size:36px;

margin-bottom:40px;

color:#1e293b;

}



.search-box{

display:flex;

justify-content:center;

gap:15px;

margin-bottom:40px;

}



input{


width:450px;


padding:15px 20px;


font-size:16px;


border:1px solid #ddd;


border-radius:12px;


outline:none;


transition:0.3s;


}



input:focus{


border-color:#2563eb;


box-shadow:0 0 10px rgba(37,99,235,.2);


}




button{


padding:15px 25px;


background:#2563eb;


color:white;


border:none;


border-radius:12px;


font-size:16px;


cursor:pointer;


transition:0.3s;


}



button:hover{


background:#1d4ed8;


}





#result{


margin-top:20px;


}





.card{


background:white;


padding:20px;


margin-bottom:20px;


border-radius:15px;


box-shadow:0 5px 15px rgba(0,0,0,.05);


}



.card h3{


font-size:24px;


margin-bottom:10px;


color:#2563eb;


}



.card p{


font-size:16px;


color:#555;


}



.card button{


margin-top:15px;


}

    </style>

</head>

<body>

    <div class="container">


<h2>

Tra cứu hoạt chất

</h2>



<div class="search-box">


<input

id="ingredient"

placeholder="Nhập tên hoạt chất..."

>



<button onclick="search()">

Tìm kiếm

</button>



</div>




<div id="result">


</div>



</div>
</body>


<script src="config.js"></script>

<script>

const user = JSON.parse(

localStorage.getItem(

'user'

)

);



if(!user){

window.location.href=

'login.html';

}

document.getElementById(

'ingredient'

)

.addEventListener(

'keypress',

function(e){

if(e.key==='Enter'){

search();

}

}

);

async function search(){

    let ingredient =
    document.getElementById("ingredient").value;


    const response = await fetch(

`${API_URL}/api/drugs/ingredient/${ingredient}`

    );


    const data = await response.json();

    if(data.length===0){

document.getElementById(

'result'

).innerHTML=

`


<div class="card">

Không tìm thấy thuốc phù hợp.

</div>


`;

return;

}    

    let html='';


    data.forEach(drug=>{


html += `

<div class="card">

<h3>${drug.trade_name}</h3>

<p>

Hoạt chất:
${drug.active_ingredient}

</p>

<button

onclick="detail(${drug.id})">

Xem chi tiết

</button>



</div>

`;

    });


document.getElementById("result").innerHTML=html;


}

function detail(id){

window.location.href=
`detail.html?id=${id}`;
}
</script>

</body>
</html>
