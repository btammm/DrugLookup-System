<!DOCTYPE html>

<html>


<head>

<meta charset="UTF-8">

<title>

Đổi mật khẩu

</title>


</head>



<body>



<h1>

Đổi mật khẩu

</h1>




<input

id="old"

type="password"

placeholder="Mật khẩu cũ">



<br>
<br>



<input

id="new"

type="password"

placeholder="Mật khẩu mới">


<br>

<br>



<button

onclick="change()"

>

Đổi mật khẩu

</button>




<script>



const user=


JSON.parse(

localStorage.getItem(

'user'

)

);




async function change(){



const response=


await fetch(

`http://localhost:5000/api/auth/change-password/${user.id}`


,

{

method:'PUT',



headers:{


'Content-Type':'application/json'


},




body:JSON.stringify({



oldPassword:


document.getElementById(

'old'

).value,





newPassword:


document.getElementById(

'new'

).value




})



}



);




const data=


await response.json();



alert(

data.message

);




if(

data.message===

"Đổi mật khẩu thành công"

){




window.location.href=

'profile.html';



}




}



</script>




</body>

</html>
