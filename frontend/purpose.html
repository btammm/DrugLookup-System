<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>

Quản lý công dụng

</title>


<style>

body{

font-family:Arial;

padding:30px;

background:#f2f5fa;

}



table{

width:100%;

border-collapse:collapse;

background:white;

}


th,td{

padding:15px;

border:1px solid #ddd;

text-align:center;

}



button{

padding:8px 12px;

margin:5px;

cursor:pointer;

}



.add{

background:green;
color:white;

}


.edit{

background:orange;
color:white;

}


.delete{

background:red;
color:white;

}


</style>


</head>


<body>


<h1>

Quản lý công dụng

</h1>



<button

class="add"

onclick="addUsage()">

Thêm công dụng

</button>




<table>



<thead>


<tr>


<th>

ID

</th>


<th>

Tên công dụng

</th>



<th>

Thao tác

</th>


</tr>



</thead>



<tbody

id="tbody">


</tbody>


</table>



<script src="config.js"></script>


<script>


async function loadUsages(){


const response=

await fetch(

`${API_URL}/api/drugs/usages`

);


const usages=

await response.json();


let html='';



usages.forEach(

usage=>{


html+=`

<tr>


<td>

${usage.id}

</td>



<td>

${usage.usage_name}

</td>



<td>


<button

class="edit"


onclick="editUsage(

${usage.id}

,

'${usage.usage_name}'

)"

>

Sửa


</button>



<button

class="delete"


onclick="deleteUsage(

${usage.id}

)"

>

Xóa


</button>


</td>


</tr>


`;


}



);



document.getElementById(

'tbody'

).innerHTML=html;



}



loadUsages();

async function addUsage(){

const name=

prompt(

"Nhập tên công dụng"

);


if(!name)return;



const response=

await fetch(

`${API_URL}/api/drugs/usages`,

{

method:'POST',


headers:{

'Content-Type':'application/json'

},


body:JSON.stringify({


usage_name:name


})



}

);



const data=

await response.json();


alert(

data.message

);



loadUsages();



}

async function editUsage(

id,

oldName

){


const name=

prompt(

"Sửa công dụng",

oldName

);



if(!name)return;



const response=

await fetch(

`${API_URL}/api/drugs/usages/${id}`

,

{

method:'PUT',



headers:{

'Content-Type':'application/json'

},



body:JSON.stringify({


usage_name:name


})


}



);



const data=

await response.json();



alert(

data.message

);



loadUsages();



}

async function deleteUsage(id){


const ok=

confirm(

"Bạn chắc chắn?"

);


if(!ok)return;




const response=

await fetch(

`${API_URL}/api/drugs/usages/${id}`

,

{

method:'DELETE'

}

);



const data=

await response.json();



alert(

data.message

);



loadUsages();



}

</script>




</body>

</html>
