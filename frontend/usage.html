<!DOCTYPE html>

<html>

<head>


<meta charset="UTF-8">


<title>

Tra cứu công dụng

</title>



<style>


body{

font-family:Arial;

padding:30px;

background:#f2f5fa;


}



input{


padding:10px;


width:300px;


}



button{


padding:10px;


background:#2196F3;


color:white;


border:none;


cursor:pointer;


}



.card{


background:white;


padding:15px;


margin-top:10px;


border-radius:10px;


}



</style>


</head>



<body>


<h2>

Tra cứu công dụng

</h2>




<input

id="usage"

placeholder="Nhập công dụng">



<button

onclick="search()">

Tìm kiếm

</button>




<div

id="result">

</div>



<script src="config.js"></script>

<script>

const user = JSON.parse(

localStorage.getItem(

'user'

)

);



if(!user){

window.location.href=

'login.html';

}

async function search(){



const value=


document.getElementById(

'usage'

).value;




const response=


await fetch(

`${API_URL}/api/drugs/usage/${value}`

);




const data=


await response.json();



let html='';



data.forEach(drug=>{


html+=`


<div class="card">


<h3>

${drug.trade_name}

</h3>



<p>

${drug.active_ingredient}

</p>



<p>

${drug.usage_name}

</p>



</div>


`;



});



document.getElementById(

'result'

).innerHTML=html;



}



</script>



</body>


</html>
