
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Đăng nhập</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:Arial;

background:#F4F8FB;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}


.login-card{


width:400px;


background:white;


padding:40px;


border-radius:20px;



box-shadow:

0 10px 30px rgba(0,0,0,.1);


}



.logo{


font-size:50px;


text-align:center;


margin-bottom:10px;


}



.title{


font-size:30px;


font-weight:bold;


text-align:center;


margin-bottom:10px;


}



.subtitle{


text-align:center;


color:#777;


margin-bottom:30px;


}



label{


font-weight:bold;


display:block;


margin-bottom:8px;


}



input{


width:100%;


padding:15px;


border:1px solid #ddd;


border-radius:12px;


margin-bottom:20px;


font-size:15px;


}



button{


width:100%;


padding:15px;


background:#2563EB;


border:none;


border-radius:12px;


color:white;


font-size:16px;


cursor:pointer;


transition:.3s;


}



button:hover{


background:#1D4ED8;


}



.register{


text-align:center;


margin-top:20px;


}



.register a{


text-decoration:none;


color:#2563EB;


font-weight:bold;


}


</style>

</head>



<body>



<div class="login-card">


<div class="logo">

💊

</div>


<div class="title">

Drug Lookup

</div>



<div class="subtitle">

Tra cứu thuốc thông minh

</div>



<label>

Email

</label>


<input

id="email"

placeholder="Nhập email">




<label>

Mật khẩu

</label>


<input

id="password"

type="password"

placeholder="Nhập mật khẩu">





<button onclick="login()">

Đăng nhập

</button>




<div class="register">

Chưa có tài khoản?


<a href="register.html">

Đăng ký

</a>


</div>



</div>



<script src="config.js"></script>

<script>


async function login(){


const email=

document.getElementById("email").value;


const password=

document.getElementById("password").value;



const response=

await fetch(

`${API_URL}/api/auth/login`,

{

method:'POST',

headers:{

'Content-Type':'application/json'

},

body:JSON.stringify({

email,
password

})

}

);



if(!response.ok){

throw new Error("API lỗi");

}



const data=

await response.json();



alert(data.message);



if(data.message==="Đăng nhập thành công"){


localStorage.setItem(

"user",

JSON.stringify(

data.user

)

);



window.location.href=

"dashboard.html";


}


}


</script>




</body>

</html>
